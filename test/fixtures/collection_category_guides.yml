  collection: vegware
  category: parent_cups_and_drinks
  buying_guide: |
    Vegware cups are the brand's plant-based, compostable range covering hot drinks, cold drinks, and smoothies.

    ## Key Factors to Consider

    ### Material

    Vegware cups use kraft paper with a PLA lining for hot drinks, and clear PLA bioplastic for cold drinks.

    ## Summary

    Vegware cups balance compostability with everyday foodservice performance.
