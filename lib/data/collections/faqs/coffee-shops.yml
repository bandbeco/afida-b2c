- question: "What packaging do I need to open a coffee shop?"
  answer: "Stock single-wall or double-wall paper hot cups in 8oz, 12oz, and 16oz, matching sip lids (89mm fits the full range), kraft sleeves for the single-wall sizes, PLA-lined cold cups for iced drinks and smoothies, paper straws, wooden stirrers, and cup carriers for multi-drink orders. Add napkins and sugar sticks for the counter and you have a complete service."

- question: "What is the difference between single-wall, double-wall, and ripple cups?"
  answer: "Single-wall cups are the cheapest option but need a kraft sleeve to insulate the customer's hand. Double-wall cups have two layers of paper bonded together for built-in insulation, no sleeve required. Ripple-wall cups have a textured outer wall that grips better and insulates without the extra material cost of double-wall. Most coffee shops stock single-wall plus sleeves for cost or double-wall for a cleaner takeaway feel."

- question: "Can I get my logo printed on coffee cups?"
  answer: "Yes. We offer [custom branded cups](/branding) with your logo, brand colours, and full-wrap design printed on 8oz, 12oz, and 16oz cups. Minimum order quantities apply and lead times are typically 4 to 6 weeks. Custom napkins, sleeves, and bags can match the same brand spec."

- question: "Are your coffee cups compostable?"
  answer: "Our paper hot cups are lined with PLA (a plant-based coating) instead of conventional polyethylene, making them commercially compostable under EN 13432. They break down in industrial composting facilities; check what your local waste contractor accepts before claiming this on customer signage."

- question: "Can I get free samples of your coffee cups before I order?"
  answer: "Yes, samples are free and you only pay the delivery fee. Order a [free sample pack](/samples) of the cup sizes, lid types, and sleeves you want to test. Run them through a couple of services to check fit and grip, then place a full order once you know the spec works for your bar."
