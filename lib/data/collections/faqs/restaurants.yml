- question: "What packaging do I need to run restaurant delivery?"
  answer: "At minimum: leak-resistant food containers with matching lids (one size group for mains, one for sides, plus 100ml portion pots for dips), kraft paper bags large enough for a typical order, two-ply napkins, and wood or PLA cutlery (single-use plastic cutlery has been banned for UK businesses since 2023). Branded burger boxes, greaseproof wraps, and cup carriers fill in the rest depending on your menu."

- question: "Can I get free samples before I commit to an order?"
  answer: "Yes. Samples are free, you only pay the delivery fee. Order a [free sample pack](/samples) of the containers, lids, cups, and bags you want to test, run a service with them, then place a full order once you know they fit your kitchen workflow and your delivery couriers."

- question: "Which restaurant packaging is microwave-safe?"
  answer: "Bagasse food containers and aluminium trays are microwave-safe and oven-safe up to 220°C. Kraft burger boxes, kraft soup cups, and PLA-lined paper containers are not. If customers reheat their leftovers, bagasse and aluminium are the safer specs to stock."

- question: "What is the difference between bagasse, kraft, and PLA containers for restaurants?"
  answer: "Bagasse is moulded sugarcane fibre: rigid, microwave and oven safe, naturally grease-resistant, and home-compostable. Kraft board is paper-based, lighter and cheaper, and works for dry hot food (burgers, fries) but not wet sauces without a coating. PLA is plant-based clear plastic: good for cold salads and showcase deli boxes, but it deforms with hot food. Most restaurants use bagasse for mains and curries, kraft for burgers and dry sides, PLA for cold."

